[tool.semantic_release]
assets = []
build_command = "python scripts/build_gui.py --all --installer"
commit_message = "Release {version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "conventional"
major_on_zero = true
tag_format = "{version}"
version_toml = [
    "config/pyproject.toml:tool.poetry.version",
]
version_variables = [
    'bandcamp_auto_uploader/__version__.py:__version__ = "{version}"',
    'bandcamp_auto_uploader/__version__.py:__version_label__ = "{version}"',
    'scripts/version.inc:#define MyAppVersion "{version}"',
    'README.md:img.shields.io/badge/Version-{version}-blue',
]

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease = false
prerelease_token = "rc"

[tool.semantic_release.changelog]
exclude_commit_patterns = [
    "chore(?:\\([^)]*?\\))?: .+",
    "ci(?:\\([^)]*?\\))?: .+",
    "refactor(?:\\([^)]*?\\))?: .+",
    "style(?:\\([^)]*?\\))?: .+",
    "test(?:\\([^)]*?\\))?: .+",
    "build(?:\\([^)]*?\\))?: .+",
    "Merged? .*",
    "Initial Commit.*",
    "^\\d+\\.\\d+\\.\\d+",
]
mode = "update"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
output_format = "md"
mask_initial_release = true

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "Bandcamp Auto Uploader Bot <bot@bandcamp-auto-uploader.app>"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "perf", "build", "chore", "ci", "docs", "style", "refactor", "test"]
default_bump_level = 0
ignore_merge_commits = true
minor_tags = ["feat"]
other_allowed_tags = ["build", "chore", "ci", "docs", "style", "refactor", "test"]
parse_squash_commits = true
patch_tags = ["fix", "perf"]

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/BandcampAutoUploader-V*/*"]
upload_to_vcs_release = true

[tool.semantic_release.remote]
name = "origin"
type = "github"
token = { env = "GITHUB_TOKEN" }
